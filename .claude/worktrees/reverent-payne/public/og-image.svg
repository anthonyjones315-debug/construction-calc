<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a1a"/>
  <!-- Orange accent bar top -->
  <rect x="0" y="0" width="1200" height="8" fill="#e8820c"/>
  <!-- Orange left bar -->
  <rect x="0" y="0" width="8" height="630" fill="#e8820c"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo icon -->
  <rect x="80" y="180" width="72" height="72" rx="14" fill="#e8820c"/>
  <text x="116" y="232" font-size="44" text-anchor="middle" fill="white">⚒</text>
  <!-- Title -->
  <text x="80" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-1">BUILD CALC PRO</text>
  <!-- Tagline -->
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#c4bfb4" letter-spacing="0.5">Free Construction Calculators for Contractors &amp; Builders</text>
  <!-- Calculator pills -->
  <rect x="80" y="440" width="160" height="44" rx="22" fill="rgba(232,130,12,0.2)" stroke="#e8820c" stroke-width="1.5"/>
  <text x="160" y="468" font-family="system-ui, sans-serif" font-size="18" fill="#e8820c" text-anchor="middle" font-weight="600">Concrete</text>
  <rect x="256" y="440" width="140" height="44" rx="22" fill="rgba(232,130,12,0.2)" stroke="#e8820c" stroke-width="1.5"/>
  <text x="326" y="468" font-family="system-ui, sans-serif" font-size="18" fill="#e8820c" text-anchor="middle" font-weight="600">Roofing</text>
  <rect x="412" y="440" width="140" height="44" rx="22" fill="rgba(232,130,12,0.2)" stroke="#e8820c" stroke-width="1.5"/>
  <text x="482" y="468" font-family="system-ui, sans-serif" font-size="18" fill="#e8820c" text-anchor="middle" font-weight="600">Framing</text>
  <rect x="568" y="440" width="160" height="44" rx="22" fill="rgba(232,130,12,0.2)" stroke="#e8820c" stroke-width="1.5"/>
  <text x="648" y="468" font-family="system-ui, sans-serif" font-size="18" fill="#e8820c" text-anchor="middle" font-weight="600">Insulation</text>
  <rect x="744" y="440" width="160" height="44" rx="22" fill="rgba(232,130,12,0.2)" stroke="#e8820c" stroke-width="1.5"/>
  <text x="824" y="468" font-family="system-ui, sans-serif" font-size="18" fill="#e8820c" text-anchor="middle" font-weight="600">Electrical</text>
  <!-- URL -->
  <text x="80" y="568" font-family="system-ui, sans-serif" font-size="24" fill="rgba(196,191,180,0.6)" letter-spacing="1">proconstructioncalc.com</text>
  <!-- No login badge -->
  <rect x="900" y="540" width="220" height="44" rx="8" fill="#e8820c"/>
  <text x="1010" y="568" font-family="system-ui, sans-serif" font-size="18" fill="#000" text-anchor="middle" font-weight="700">NO LOGIN · NO PAYWALL</text>
</svg>
