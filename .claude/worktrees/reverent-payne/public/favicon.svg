  <!-- Orange accent bar at top -->
  <rect x="0" y="0" width="32" height="3" rx="1.5" fill="#e8820c"/>
  <!-- Hammer head -->
  <rect x="6" y="8" width="14" height="7" rx="2" fill="#e8820c"/>
  <!-- Hammer claw notch -->
  <rect x="16" y="10" width="4" height="1.5" rx="0.5" fill="#1a1a1a"/>
  <!-- Hammer handle -->
  <rect x="13" y="14" width="3.5" height="12" rx="1.5" fill="#c4bfb4" transform="rotate(-35 14.75 20)"/>
</svg>
