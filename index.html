        <h1>Build Calc Pro — Free Construction Calculators</h1>
        <p>Free professional construction calculators for contractors, builders, and homeowners. No login required, no paywall. Built by a union carpenter with real field experience.</p>

        <h2>Available Calculators</h2>
        <ul>
          <li><strong>Concrete Slab Calculator</strong> — Calculate cubic yards, cubic feet, and 80 lb bags for any slab. Includes 10% waste factor.</li>
          <li><strong>Concrete Footing Calculator</strong> — Volume for strip and continuous footings.</li>
          <li><strong>Roof Pitch Calculator</strong> — Calculate pitch from rise/run, span, or angle. Get compatible roofing materials and pitch factor.</li>
          <li><strong>Roofing Squares Calculator</strong> — Calculate squares, bundles, and total roof area with pitch factor and 15% waste.</li>
          <li><strong>Wall Stud Calculator</strong> — 16" and 24" on-center stud counts with plates.</li>
          <li><strong>Rafter Length Calculator</strong> — Rafter length from span and pitch.</li>
          <li><strong>Room Area Calculator</strong> — Floor area, wall area, volume, and paint coverage.</li>
          <li><strong>Drywall Calculator</strong> — Sheet count and square footage with 12% waste.</li>
          <li><strong>Brick Calculator</strong> — Brick count for walls with mortar joint factor.</li>
          <li><strong>Wire Gauge & Ampacity Calculator</strong> — NEC-based wire sizing and voltage drop check.</li>
          <li><strong>Spray Foam Insulation Calculator</strong> — Board feet, R-value, kit count for open-cell and closed-cell foam.</li>
          <li><strong>Cellulose Insulation Calculator</strong> — Bag count for blown-in attic or wall insulation.</li>
          <li><strong>Triangle Area Calculator</strong> — Gable ends and hip roof sections.</li>
        </ul>

        <h2>Why Build Calc Pro?</h2>
        <p>Built by someone who spent 3 years as a union carpenter, moved into project management and estimation, then HVAC and insulation residential sales, and now works in digital presence for trades businesses. These calculators use the same formulas contractors use in the field — with real waste factors and trade-accurate results.</p>

        <h2>Frequently Asked Questions</h2>
        <h3>How do I calculate concrete for a slab?</h3>
        <p>Multiply length × width × thickness (in feet), divide by 27 for cubic yards. Add 10% for waste. Our concrete slab calculator does this automatically.</p>

        <h3>What is roof pitch?</h3>
        <p>Roof pitch is the ratio of vertical rise to horizontal run, expressed as X:12. A 6:12 pitch rises 6 inches for every 12 inches of horizontal distance.</p>

        <h3>How many board feet of spray foam do I need?</h3>
        <p>Board feet = square footage × desired thickness in inches. Our spray foam calculator handles open-cell and closed-cell with kit count and cost estimate.</p>
